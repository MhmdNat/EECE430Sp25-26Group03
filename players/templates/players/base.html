<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voley Player List</title>
    <style>
        :root {
            --bg: #f3f4f8;
            --surface: #ffffff;
            --surface-alt: #f8fafc;
            --text: #1f2937;
            --muted: #64748b;
            --primary: #0f766e;
            --primary-hover: #115e59;
            --danger: #b91c1c;
            --danger-hover: #991b1b;
            --border: #e2e8f0;
            --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, #dbeafe 0%, transparent 35%),
                radial-gradient(circle at bottom left, #ccfbf1 0%, transparent 40%),
                var(--bg);
            min-height: 100vh;
        }

        .container {
            width: min(960px, 92%);
            margin: 2rem auto;
        }

        header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.2rem;
        }

        h1,
        h2,
        h3 {
            margin-top: 0;
        }

        h1 {
            font-size: 1.7rem;
            margin-bottom: 0.9rem;
        }

        .nav-links {
            display: flex;
            gap: 0.65rem;
            flex-wrap: wrap;
        }

        .page-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.3rem;
        }

        .row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .stack {
            display: grid;
            gap: 0.8rem;
        }

        .player-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 0.65rem;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.85rem 1rem;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.75rem;
        }

        .meta-item {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem;
        }

        .meta-label {
            display: block;
            color: var(--muted);
            font-size: 0.88rem;
            margin-bottom: 0.2rem;
        }

        form p {
            margin: 0 0 0.85rem;
        }

        form label {
            display: block;
            margin-bottom: 0.35rem;
            font-weight: 600;
        }

        form input,
        form select,
        form textarea {
            width: 100%;
            padding: 0.62rem 0.72rem;
            border: 1px solid #cbd5e1;
            border-radius: 9px;
            font: inherit;
            background: #fff;
        }

        form input:focus,
        form select:focus,
        form textarea:focus {
            outline: 2px solid rgba(15, 118, 110, 0.22);
            border-color: var(--primary);
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            padding: 0.58rem 0.9rem;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background-color 0.2s ease, transform 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-danger:hover {
            background: var(--danger-hover);
        }

        .btn-ghost {
            background: #eef2f7;
            color: var(--text);
        }

        .btn-ghost:hover {
            background: #e2e8f0;
        }

        .muted {
            color: var(--muted);
        }

        .error {
            border: 1px solid #fecaca;
            color: #991b1b;
            background: #fef2f2;
            border-radius: 10px;
            padding: 0.7rem 0.8rem;
        }

        @media (max-width: 640px) {
            .container {
                width: 94%;
                margin: 1.2rem auto;
            }

            header,
            .page-card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Voley Player List</h1>
            <nav class="nav-links">
                <a class="btn btn-ghost" href="{% url 'players:list' %}">All Players</a>
                <a class="btn btn-primary" href="{% url 'players:create' %}">Add Player</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
